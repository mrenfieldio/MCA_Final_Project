
<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; background:#f8fafc; padding:20px;">
    <div style="max-width:600px; margin:auto; background:white; padding:24px; border-radius:10px;">
      
      <h2 style="color:#16a34a;">Congratulations {{ name }}!</h2>

      <p>
        We are pleased to inform you that you have been selected for the role of 
        <strong>{{ job_title }}</strong>.
      </p>

      <p>
        Our team will contact you shortly with further details.
      </p>

      <hr style="margin:20px 0;"/>

      <p style="font-size:12px; color:#64748b;">
        Regards,<br/>
        {{ company_name }}
      </p>

    </div>
  </body>
</html>
